<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>YOUVE BEEN SUMMONED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #000000;
      --text:     #8cba8c;
      --bright:   #cce8cc;
      --green:    #48a848;
      --green-dk: #2d7a2d;
      --dim:      #182a18;
      --muted:    #486848;
      --red:      #c04030;
      --blue:     #5090cc;
      --white:    #e0f0e0;
      --gold:     #d4a830;
    }

    html, body { min-height: 100dvh; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 56px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,.06) 2px,
        rgba(0,0,0,.06) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    #sender-view {
      width: 100%;
      max-width: 500px;
    }

    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(13px, 4vw, 18px);
      color: var(--gold);
      text-align: center;
      line-height: 2;
      margin-bottom: 4px;
      text-shadow: 0 0 24px rgba(212,168,48,.4);
    }

    .logo-sub {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    .logo-rule {
      border: none;
      border-top: 1px solid var(--dim);
      margin: 24px 0 32px;
    }

    .s-lbl {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .s-field { margin-bottom: 22px; }

    input, select {
      width: 100%;
      background: #000;
      border: 1px solid var(--dim);
      border-radius: 0;
      color: var(--bright);
      font-family: 'Courier New', monospace;
      font-size: 14px;
      padding: 12px;
      transition: border-color .12s;
    }

    input:focus, select:focus { outline: none; border-color: var(--gold); }
    select option { background: #0d0d0d; }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      margin-top: 8px;
    }

    .forge-btn, .next-btn, .rev-map {
      width: 100%;
      padding: 15px;
      background: transparent;
      border: 2px solid var(--green);
      color: var(--green);
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: background .12s, color .12s, box-shadow .12s;
      margin-bottom: 28px;
      line-height: 2;
      text-align: center;
      text-decoration: none;
      display: block;
    }

    .forge-btn:hover, .rev-map:hover {
      background: var(--green);
      color: #000;
      box-shadow: 0 0 20px rgba(72,168,72,.3);
    }

    #link-result {
      border: 1px solid var(--dim);
      padding: 18px;
      animation: fadeUp .4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .res-lbl {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .res-url {
      font-size: 11px;
      color: var(--blue);
      word-break: break-all;
      line-height: 1.7;
      margin-bottom: 14px;
    }

    .copy-row {
      display: grid;
      gap: 10px;
    }

    #copy-btn, #sms-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: border-color .12s, color .12s;
      text-decoration: none;
      text-align: center;
    }

    #copy-btn:hover, #sms-btn:hover { border-color: var(--gold); color: var(--gold); }
    #copy-btn.ok { border-color: var(--green); color: var(--green); }

    #rpg-view {
      width: 100%;
      max-width: 580px;
    }

    .scene-enter { animation: fadeUp .45s ease; }

    .sc-eyebrow {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .sc-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(11px, 3.5vw, 16px);
      color: var(--gold);
      line-height: 1.9;
      margin-bottom: 28px;
      text-shadow: 0 0 18px rgba(212,168,48,.3);
    }

    .sc-hr {
      border: none;
      border-top: 1px solid var(--dim);
      margin: 24px 0;
    }

    .sc-text {
      font-size: 14px;
      line-height: 2.2;
      color: var(--text);
      white-space: pre-line;
      margin-bottom: 18px;
    }

    .sc-speech {
      font-size: 13px;
      line-height: 2.1;
      color: var(--white);
      font-style: italic;
      border-left: 3px solid var(--muted);
      padding: 6px 0 6px 18px;
      margin: 20px 0;
      white-space: pre-line;
    }

    .sc-inscription {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(7px, 2.2vw, 10px);
      color: var(--gold);
      line-height: 2.4;
      text-align: center;
      letter-spacing: 3px;
      border: 1px solid var(--dim);
      padding: 18px 14px;
      margin: 24px 0;
      text-shadow: 0 0 12px rgba(212,168,48,.25);
      white-space: pre-line;
    }

    .cursor-blink {
      display: inline-block;
      width: 9px;
      height: 1em;
      background: var(--gold);
      vertical-align: text-bottom;
      animation: blink .75s step-end infinite;
      margin-left: 1px;
    }

    @keyframes blink { 50% { opacity: 0; } }

    #scene-opts {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .opt {
      width: 100%;
      padding: 14px 16px;
      background: transparent;
      border: 1px solid var(--dim);
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.7;
      text-align: left;
      cursor: pointer;
      transition: border-color .1s, background .1s, color .1s;
      position: relative;
    }

    .opt::before  { content: '▶  '; color: var(--muted); }
    .opt:hover:not(:disabled) {
      border-color: var(--gold);
      background: rgba(212,168,48,.06);
      color: var(--bright);
    }
    .opt:hover:not(:disabled)::before { color: var(--gold); }
    .opt.correct { border-color: var(--green); color: var(--green); pointer-events: none; }
    .opt.correct::before { color: var(--green); content: '✓  '; }
    .opt.dimmed { opacity: .25; pointer-events: none; }

    #scene-feedback {
      margin-top: 18px;
      font-size: 13px;
      line-height: 2.1;
      font-style: italic;
      white-space: pre-line;
      min-height: 26px;
      color: var(--green);
    }

    .next-btn {
      border-color: var(--gold);
      color: var(--gold);
      animation: fadeUp .35s ease;
      margin-top: 28px;
    }

    .next-btn:hover {
      background: var(--gold);
      color: #000;
      box-shadow: 0 0 20px rgba(212,168,48,.25);
    }

    .rev-card {
      border: 1px solid var(--dim);
      padding: 18px;
      margin: 18px 0 26px;
    }

    .rev-lbl {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .rev-big {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(13px, 4.5vw, 22px);
      color: var(--gold);
      line-height: 1.9;
      margin-bottom: 22px;
      text-shadow: 0 0 28px rgba(212,168,48,.45);
      word-break: break-word;
    }

    .rev-time {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(16px, 5vw, 28px);
      color: var(--bright);
      line-height: 1.8;
      margin-bottom: 22px;
      text-shadow: 0 0 24px rgba(237,224,184,.2);
    }

    .rev-footer {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--dim);
      text-align: center;
      letter-spacing: 3px;
      margin-top: 32px;
      line-height: 2.5;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: .4; }
      50% { opacity: 1; }
    }

    .skip-hint {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: var(--dim);
      text-align: right;
      letter-spacing: 2px;
      margin-top: 10px;
      margin-bottom: -4px;
      animation: blink 1.8s step-end infinite;
    }
  </style>
</head>
<body>

<div id="sender-view">
  <div class="logo">YOUVE BEEN SUMMONED</div>
  <div class="logo-sub">— complete the quest to know when & where —</div>
  <hr class="logo-rule">

  <div class="s-field">
    <div class="s-lbl">Recipient name</div>
    <input id="name-in" type="text" placeholder="e.g. Maya" autocomplete="off" />
  </div>

  <div class="s-field">
    <div class="s-lbl">Google Maps link</div>
    <input id="maps-in" type="url" placeholder="Paste a Google Maps link" inputmode="url" />
    <div class="hint">Short links like maps.app.goo.gl work. If the link contains a place name, the quest will show it too.</div>
  </div>

  <div class="s-field">
    <div class="s-lbl">Quest length</div>
    <select id="parts-sel">
      <option value="1">1 part — quick reveal</option>
      <option value="2">2 parts — medium quest</option>
      <option value="3" selected>3 parts — full quest</option>
    </select>
  </div>

  <div class="s-field">
    <div class="s-lbl">Date and time</div>
    <input id="datetime-in" type="datetime-local" />
  </div>

  <button class="forge-btn" id="generate-btn">⚔ &nbsp;FORGE THE QUEST</button>

  <div id="link-result" style="display:none">
    <div class="res-lbl">Your quest text is ready</div>
    <div class="res-url" id="res-url"></div>
    <div class="copy-row">
      <button id="copy-btn">✉ &nbsp;Copy Text &amp; Link</button>
      <a id="sms-btn" href="#">📱 &nbsp;Open Text Message</a>
    </div>
  </div>
</div>

<div id="rpg-view" style="display:none">
  <div id="scene-wrap"></div>
</div>

<script>
'use strict';

const BASE_URL_OVERRIDE = 'https://codefean.github.io/bridge-mail/';

function getBaseUrl() {
  if (BASE_URL_OVERRIDE) return BASE_URL_OVERRIDE.replace(/\?.*$/, '').replace(/\/$/, '');
  const href = location.href;
  if (href.startsWith('about:') || href.startsWith('blob:')) return null;
  return href.replace(/\?.*$/, '');
}

function cleanName(name) {
  return (name || 'traveler').trim().slice(0, 40) || 'traveler';
}

function cleanParts(parts) {
  const n = Number(parts);
  return [1, 2, 3].includes(n) ? n : 3;
}

function makeQuestSeed() {
  if (window.crypto && crypto.getRandomValues) {
    const arr = new Uint32Array(2);
    crypto.getRandomValues(arr);
    return Array.from(arr).map(n => n.toString(36)).join('');
  }
  return `${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`;
}

function isProbablyMapsLink(url) {
  try {
    const u = new URL(url);
    return /(^|\.)google\./i.test(u.hostname) || /(^|\.)goo\.gl$/i.test(u.hostname) || /maps\.app\.goo\.gl$/i.test(u.hostname);
  } catch {
    return false;
  }
}

function formatQuestDate(dt) {
  if (!dt) return 'a time chosen by your summoner';
  const d = new Date(dt);
  if (Number.isNaN(d.getTime())) return dt;
  return new Intl.DateTimeFormat(undefined, {
    weekday: 'long',
    month: 'long',
    day: 'numeric',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  }).format(d);
}

function extractPlaceLabel(mapsUrl) {
  try {
    const u = new URL(mapsUrl);

    const directParams = ['q', 'query', 'destination', 'daddr'];
    for (const key of directParams) {
      const v = u.searchParams.get(key);
      if (v) return decodeURIComponent(v.replace(/\+/g, ' '));
    }

    const placeMatch = decodeURIComponent(u.pathname).match(/\/place\/([^/]+)/);
    if (placeMatch && placeMatch[1]) return placeMatch[1].replace(/\+/g, ' ');

    return '';
  } catch {
    return '';
  }
}

const qp = new URLSearchParams(location.search);
const quest = {
  name: cleanName(qp.get('n')),
  maps: qp.get('m') || '',
  parts: cleanParts(qp.get('p')),
  datetime: qp.get('dt') || '',
  seed: qp.get('s') || ''
};

if (quest.maps && quest.datetime) {
  document.getElementById('sender-view').style.display = 'none';
  document.getElementById('rpg-view').style.display = 'block';
  initRPG(quest);
} else {
  initSender();
}

function initSender() {
  const nameIn = document.getElementById('name-in');
  const mapsIn = document.getElementById('maps-in');
  const partsSel = document.getElementById('parts-sel');
  const datetimeIn = document.getElementById('datetime-in');

  let shareMsg = '';

  document.getElementById('generate-btn').onclick = () => {
    const recipient = cleanName(nameIn.value);
    const maps = mapsIn.value.trim();
    const parts = cleanParts(partsSel.value);
    const dt = datetimeIn.value;

    if (!recipient || !maps || !dt) {
      alert('Add a name, Google Maps link, and date/time.');
      return;
    }

    if (!isProbablyMapsLink(maps)) {
      const ok = confirm('This does not look like a Google Maps link. Use it anyway?');
      if (!ok) return;
    }

    const base = getBaseUrl();
    if (!base) {
      alert('Deploy the page first so it has a real URL to share.');
      return;
    }

    const params = new URLSearchParams({
      n: recipient,
      m: maps,
      p: String(parts),
      dt,
      s: makeQuestSeed()
    });

    const url = `${base}?${params.toString()}`;
    shareMsg = `${recipient}, a quest has been written for you.\n\nOpen this link, complete the trial${parts === 1 ? '' : 's'}, and your exact meeting place and time will be revealed:\n\n${url}`;

    document.getElementById('res-url').textContent = url;
    document.getElementById('sms-btn').href = `sms:?&body=${encodeURIComponent(shareMsg)}`;
    document.getElementById('link-result').style.display = 'block';
  };

  document.getElementById('copy-btn').onclick = async () => {
    if (!shareMsg) return;
    const btn = document.getElementById('copy-btn');
    try {
      await navigator.clipboard.writeText(shareMsg);
    } catch {
      const ta = Object.assign(document.createElement('textarea'), { value: shareMsg });
      Object.assign(ta.style, { position:'fixed', opacity:'0' });
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand('copy'); ta.remove();
    }
    btn.textContent = '✓  Quest Copied!';
    btn.classList.add('ok');
    setTimeout(() => {
      btn.textContent = '✉ \u00a0Copy Text & Link';
      btn.classList.remove('ok');
    }, 2400);
  };
}

function initRPG(quest) {
  const wrap = document.getElementById('scene-wrap');
  let sceneIdx = 0;
  let skipFlag = false;

  function hashString(str) {
    let h = 2166136261;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }

  function seededRandom(seedText) {
    let state = hashString(seedText || `${quest.name}|${quest.maps}|${quest.datetime}|${quest.parts}`);
    return function rand() {
      state += 0x6D2B79F5;
      let t = state;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function shuffleWithSeed(items, rand) {
    const arr = items.slice();
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  const TRIAL_POOL = [
    {
      title: 'THE FERRYMAN\'S RIDDLE',
      content: [
        { type:'text', text:'The road narrows until it meets a river. No boat. No ferry. Only an old man on a mossy stone, smoking something suspicious and playing Fetty Wap from a tiny speaker.' },
        { type:'speech', text:'"I stand between two shores, holding nothing in my hands, yet I carry all who cross. I endure storm, flood, silence, and people taking Instagram photos in the middle of me. What am I?"' },
      ],
      options: [
        { text:'A boatman.', correct:false, response:'He sighs. "A boatman gets tired. A boatman asks for Swish. Try again."' },
        { text:'A bridge.', correct:true, response:'"Aye," he says. "You understand the crossing. Slightly worrying that this impressed me, but here we are."' },
        { text:'The river itself.', correct:false, response:'"The river carries bodies and secrets. Dark answer. Wrong answer."' },
      ],
    },
    {
      title: 'THE SEXY PENGUIN OF THE FROZEN PASS',
      content: [
        { type:'text', text:'The road climbs into frosted hills. At a ruined waypost sits a penguin, flippers cracked from the cold, belly feathers iced over, somehow still serving face.' },
        { type:'speech', text:'"Traveler," the penguin says, "I ask for little. Only courage, kindness, and perhaps one extra-strong snus if thou hast it."' },
        { type:'text', text:'You have just enough for yourself. The pass does not grow shorter while you stand there being morally examined by a hot bird.' },
      ],
      options: [
        { text:'Give the penguin your snus.', anyCorrect:true, response:'The penguin bows deeply. "A noble sacrifice." He immediately takes two portions at once. You regret nothing. Mostly.' },
        { text:'Describe the nearest snus shop.', anyCorrect:true, response:'He listens with the intensity of a tiny arctic detective. "Your directions are acceptable," he honks. The quest allows this.' },
        { text:'Offer emotional support instead.', anyCorrect:true, response:'The penguin nods. "Not nicotine, but not nothing." He waddles onward with troubling confidence.' },
      ],
    },
    {
      title: 'THE CLOCKKEEPER\'S OATH',
      content: [
        { type:'text', text:'You enter a hall of clocks. Every clock shows a different version of "almost there". One is clearly still in bed.' },
        { type:'speech', text:'"A quest is ruined not by monsters," says the Clockkeeper, "but by a companion texting \'leaving now\' while searching for socks."' },
      ],
      options: [
        { text:'Swear to honor the appointed time.', anyCorrect:true, response:'The clocks fall silent. One tiny clock whispers, "finally, an adult."' },
        { text:'Swear not to say "two minutes" unless it is true.', anyCorrect:true, response:'A bell rings. Somewhere, an Uber driver sheds a single grateful tear.' },
        { text:'Promise to arrive fashionably mysterious, not late.', anyCorrect:true, response:'The Clockkeeper accepts this loophole with visible suspicion.' },
      ],
    },
    {
      title: 'THE THREE DOORS OF BAD DECISIONS',
      content: [
        { type:'text', text:'Three doors stand before you. One says GLORY HOLE. One says MILFS. One says DO NOT OPEN (more milfs).' },
        { type:'speech', text:'"Choose," says a voice from nowhere. "But know this: every door is judging your shoes."' },
      ],
      options: [
        { text:'Open GLORY.', anyCorrect:true, response:'A trumpet plays one confident note, then gives up. Still, the path continues.' },
        { text:'Open SNACKS.', anyCorrect:true, response:'Correct. Spiritually, if not logistically. You gain invisible crisps and proceed.' },
        { text:'Open DO NOT OPEN.', anyCorrect:true, response:'The door gasps. "Scandalous." It opens immediately. Reverse psychology remains undefeated.' },
      ],
    },
    {
      title: 'THE GOBLIN OF TERMS AND CONDITIONS',
      content: [
        { type:'text', text:'A goblin blocks the road with a clipboard longer than his body. He wears tiny reading glasses and the expression of someone who has discovered bureaucracy and made it everyone else\'s problem.' },
        { type:'speech', text:'"Before continuing, you must agree to the Quest Terms. They are mostly vibes, one curse, and a cookie policy I copied from a printer manual."' },
      ],
      options: [
        { text:'Accept without reading.', anyCorrect:true, response:'The goblin nods. "Standard procedure." You may have sold your shadow, but the meeting grows closer.' },
        { text:'Ask for the short version.', anyCorrect:true, response:'"Be cool. Show up. Do not lick enchanted objects." Reasonable enough.' },
        { text:'Initial every page with dramatic flair.', anyCorrect:true, response:'The goblin is moved to tears. No one has respected his admin before.' },
      ],
    },
    {
      title: 'THE MIRROR THAT ROASTS YOU',
      content: [
        { type:'text', text:`A silver mirror hangs from a dead tree. As ${quest.name} approaches, the glass ripples like water and immediately develops an attitude.` },
        { type:'speech', text:'"To pass," says the mirror, "you must survive one honest reflection. Your hair is doing a side quest of its own."' },
      ],
      options: [
        { text:'Thank the mirror for its honesty.', anyCorrect:true, response:'The mirror is disarmed. It was prepared for tears, not emotional maturity.' },
        { text:'Roast the mirror back.', anyCorrect:true, response:'"At least I have depth," you say. The mirror cracks slightly. Devastating.' },
        { text:'Pretend you did not hear it.', anyCorrect:true, response:'A classic defense. The mirror respects the ancient art of ignoring problems until brunch.' },
      ],
    },
    {
      title: 'THE TROLL AT THE VIBE CHECKPOINT',
      content: [
        { type:'text', text:'A troll in a tiny security vest guards a bridge made of questionable planks and excellent intentions.' },
        { type:'speech', text:'"No one passes without a vibe check," he grunts. "State your business, your energy, and whether you are bringing weird tension to the function."' },
      ],
      options: [
        { text:'Declare peaceful but chaotic intentions.', anyCorrect:true, response:'The troll stamps your wrist with invisible ink. "Chaotic, but house-trained. Proceed."' },
        { text:'Offer a compliment to the bridge.', anyCorrect:true, response:'The bridge creaks bashfully. The troll wipes away a tear and lets you pass.' },
        { text:'Promise not to start lore-heavy drama.', anyCorrect:true, response:'The troll narrows his eyes. "Ambitious promise." Still, he steps aside.' },
      ],
    },
    {
      title: 'THE ORACLE OF GROUP CHAT',
      content: [
        { type:'text', text:'A glowing phone rises from a stone pedestal. Its screen contains 78 unread messages and absolutely no plan.' },
        { type:'speech', text:'"Many speak," says the Oracle. "Few decide. Can you withstand the sacred chaos of \'where are we meeting again?\'"' },
      ],
      options: [
        { text:'Mute the chat and trust the quest.', anyCorrect:true, response:'The Oracle vibrates approvingly. Peace is restored for approximately eight seconds.' },
        { text:'Send one clear message like a hero.', anyCorrect:true, response:'The heavens open. Somewhere, a calendar invite blushes.' },
        { text:'React with a thumbs-up and vanish.', anyCorrect:true, response:'Cowardly? Perhaps. Effective? Ancient scholars disagree, but the gate opens.' },
      ],
    },
    {
      title: 'THE CART DILEMMA',
      content: [
        { type:'text', text:'A grain cart breaks loose at the top of a hill. At the bottom, five villagers argue about astrology directly in its path.' },
        { type:'text', text:'Beside you is a lever. Pulling it redirects the cart into a very expensive artisanal oat milk stand run by a man who definitely says "mouthfeel".' },
        { type:'inscription', text:'"WHOM DO YOU SAVE?"' },
      ],
      options: [
        { text:'Pull the lever. Save the astrology villagers.', anyCorrect:true, response:'The cart destroys the oat milk stand. A cloud of premium foam rises into the sky. You have saved lives and offended Södermalm.' },
        { text:'Do nothing. Let fate take the wheel.', anyCorrect:true, response:'Fate immediately proves underqualified. The lesson is unclear, but emotionally expensive.' },
      ],
    },
    {
      title: 'THE RIDDLE OF THE OVERPACKED BAG',
      content: [
        { type:'text', text:'An ancient backpack blocks the path. It bulges with cables, receipts, three lip balms, and a banana that has seen too much.' },
        { type:'speech', text:'"I am carried everywhere, yet I carry the carrier. I contain what is needed, what is forgotten, and one object nobody can explain. What am I?"' },
      ],
      options: [
        { text:'A backpack.', correct:true, response:'The bag unzips itself with relief. "Finally. I was one loose mint away from becoming a cryptid."' },
        { text:'A cursed cupboard.', correct:false, response:'Close in spirit, wrong in taxonomy. The banana makes eye contact. Try again.' },
        { text:'Emotional baggage.', correct:false, response:'Too real. The quest is not licensed for therapy. Try again.' },
      ],
    },
    {
      title: 'THE SWAMP OF ALMOST PLANS',
      content: [
        { type:'text', text:'You step into a swamp where every reed whispers a half-plan: "maybe around seven", "somewhere central", "let\'s play it by ear".' },
        { type:'speech', text:'"Only the decisive may cross," croaks a frog wearing a tiny crown. "Speak one concrete intention and be cleansed of vagueness."' },
      ],
      options: [
        { text:'Say: I will go where the quest tells me.', anyCorrect:true, response:'The swamp parts. The frog crown glints with respect.' },
        { text:'Say: I accept exact time and exact place.', anyCorrect:true, response:'A calendar icon appears in the mist and salutes you.' },
        { text:'Say: I reject "we\'ll see".', anyCorrect:true, response:'The swamp screams, then becomes a normal puddle. Powerful magic.' },
      ],
    },
    {
      title: 'THE FINAL TURN OF SUSPICIOUSLY GOOD LIGHTING',
      content: [
        { type:'text', text:'The road reaches a final bend. The air smells like rain, victory, and someone nearby wearing too much cologne.' },
        { type:'speech', text:'"The destination is real," says the wind. "The reveal is earned. Step forward and try to look casual about it."' },
      ],
      options: [
        { text:'Step forward heroically.', anyCorrect:true, response:'Your silhouette is excellent. The quest has no notes.' },
        { text:'Step forward like you meant to do that.', anyCorrect:true, response:'A dramatic cape appears for half a second, then remembers you did not pay for premium.' },
        { text:'Step forward while pretending not to be excited.', anyCorrect:true, response:'The universe sees through you, but politely says nothing.' },
      ],
    },
  ];

  const rand = seededRandom(quest.seed);
  const selectedTrials = shuffleWithSeed(TRIAL_POOL, rand)
    .slice(0, quest.parts)
    .map((trial, i) => ({ ...trial, eyebrow: `TRIAL ${i + 1}` }));

  const SCENES = [
    {
      eyebrow: '',
      title: 'A QUEST FINDS YOU',
      content: [
        { type:'text', text:`${quest.name}, a message has arrived with your name written in bright green fire.` },
        { type:'speech', text:`"Complete ${quest.parts === 1 ? 'one trial' : quest.parts + ' trials'}, and the exact meeting place and time shall be revealed."` },
        { type:'text', text:'The map is sealed. The hour is hidden. The quest begins.' },
      ],
      action: { label:'▶  BEGIN THE QUEST', next:1 },
    },
    ...selectedTrials,
    { type:'revelation' },
  ];

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  async function typeEl(el, text, speed = 15) {
    el.textContent = '';
    const cursor = document.createElement('span');
    cursor.className = 'cursor-blink';
    el.appendChild(cursor);

    let built = '';
    for (const ch of text) {
      if (skipFlag) { el.textContent = text; return; }
      built += ch;
      el.textContent = built;
      el.appendChild(cursor);
      await sleep(ch === '\n' ? 85 : speed);
    }
    el.textContent = text;
  }

  function renderScene(idx) {
    skipFlag = false;
    const scene = SCENES[idx];

    if (scene.type === 'revelation') { renderRevelation(); return; }

    wrap.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'scene-enter';
    wrap.appendChild(div);

    if (scene.eyebrow) {
      const ey = document.createElement('div');
      ey.className = 'sc-eyebrow';
      ey.textContent = `${scene.eyebrow} OF ${quest.parts}`;
      div.appendChild(ey);
    }

    const titleEl = document.createElement('div');
    titleEl.className = 'sc-title';
    titleEl.textContent = scene.title;
    div.appendChild(titleEl);

    const hr = document.createElement('hr');
    hr.className = 'sc-hr';
    div.appendChild(hr);

    const contentArea = document.createElement('div');
    div.appendChild(contentArea);

    const hint = document.createElement('div');
    hint.className = 'skip-hint';
    hint.textContent = 'TAP TO SKIP ▶';
    div.appendChild(hint);

    let typingDone = false;
    const skipTyping = () => { if (!typingDone) skipFlag = true; };
    wrap.addEventListener('click', skipTyping);

    (async () => {
      for (const block of scene.content) {
        await sleep(skipFlag ? 0 : 220);
        let el;
        if (block.type === 'text') {
          el = document.createElement('p'); el.className = 'sc-text';
        } else if (block.type === 'speech') {
          el = document.createElement('div'); el.className = 'sc-speech';
        } else if (block.type === 'inscription') {
          el = document.createElement('div'); el.className = 'sc-inscription';
        }
        contentArea.appendChild(el);
        await typeEl(el, block.text, skipFlag ? 0 : 15);
        await sleep(skipFlag ? 0 : 280);
      }

      typingDone = true;
      hint.remove();
      wrap.removeEventListener('click', skipTyping);

      if (scene.options) renderOptions(div, scene);
      else if (scene.action) renderAction(div, scene.action);
    })();
  }

  function renderOptions(parent, scene) {
    const optsDiv = document.createElement('div');
    optsDiv.id = 'scene-opts';
    parent.appendChild(optsDiv);

    const feedback = document.createElement('div');
    feedback.id = 'scene-feedback';
    parent.appendChild(feedback);

    let answered = false;
    let locked = false;

    const optionRand = seededRandom(`${quest.seed}|${scene.title}`);
    shuffleWithSeed(scene.options, optionRand).forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'opt';
      btn.textContent = opt.text;
      optsDiv.appendChild(btn);

      btn.onclick = async () => {
        if (locked || answered || btn.classList.contains('wrong')) return;

        const isCorrect = opt.correct === true || opt.anyCorrect === true || opt.correct === undefined;
        locked = true;
        feedback.textContent = '';
        skipFlag = false;

        if (!isCorrect) {
          btn.classList.add('wrong');
          feedback.className = 'neg';
          await typeEl(feedback, opt.response || 'The quest makes a disappointed clicking sound. Try again.', 13);
          locked = false;
          return;
        }

        answered = true;
        btn.classList.add('correct');
        optsDiv.querySelectorAll('.opt:not(.correct)').forEach(b => b.classList.add('dimmed'));
        feedback.className = 'pos';

        await typeEl(feedback, opt.response, 13);

        const nb = document.createElement('button');
        nb.className = 'next-btn';
        nb.textContent = sceneIdx >= quest.parts ? '▶  REVEAL THE MEETING' : '▶  CONTINUE THE QUEST';
        parent.appendChild(nb);
        nb.onclick = () => { sceneIdx++; renderScene(sceneIdx); };
        locked = false;
      };
    });
  }

  function renderAction(parent, action) {
    const btn = document.createElement('button');
    btn.className = 'next-btn';
    btn.textContent = action.label;
    parent.appendChild(btn);
    btn.onclick = () => { sceneIdx = action.next; renderScene(sceneIdx); };
  }

  async function renderRevelation() {
    wrap.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'scene-enter';
    wrap.appendChild(div);

    const placeLabel = extractPlaceLabel(quest.maps);
    const formattedDate = formatQuestDate(quest.datetime);

    const ey = document.createElement('div');
    ey.className = 'sc-eyebrow';
    ey.textContent = 'THE QUEST REVEALS ITSELF';
    div.appendChild(ey);

    const titleEl = document.createElement('div');
    titleEl.className = 'sc-title';
    titleEl.textContent = `${quest.name.toUpperCase()}, YOU ARE SUMMONED`;
    div.appendChild(titleEl);

    const hr = document.createElement('hr'); hr.className = 'sc-hr'; div.appendChild(hr);

    const intro = document.createElement('p');
    intro.className = 'sc-text';
    div.appendChild(intro);
    await typeEl(intro, 'The trials are complete. The hidden meeting can now be known.', 15);

    const card = document.createElement('div');
    card.className = 'rev-card';
    div.appendChild(card);

    const placeLbl = document.createElement('div');
    placeLbl.className = 'rev-lbl';
    placeLbl.textContent = 'EXACT LOCATION';
    card.appendChild(placeLbl);

    const place = document.createElement('div');
    place.className = 'rev-big';
    place.textContent = placeLabel || 'Open the Google Maps quest marker';
    card.appendChild(place);

    const timeLbl = document.createElement('div');
    timeLbl.className = 'rev-lbl';
    timeLbl.textContent = 'DATE AND TIME';
    card.appendChild(timeLbl);

    const time = document.createElement('div');
    time.className = 'rev-time';
    time.textContent = formattedDate;
    card.appendChild(time);

    const mapA = document.createElement('a');
    mapA.className = 'rev-map';
    mapA.href = quest.maps;
    mapA.target = '_blank';
    mapA.rel = 'noopener noreferrer';
    mapA.textContent = '📍  OPEN EXACT LOCATION IN MAPS';
    div.appendChild(mapA);

    const footer = document.createElement('div');
    footer.className = 'rev-footer';
    footer.textContent = 'Do not be late.';
    div.appendChild(footer);
  }

  renderScene(0);
}
</script>
</body>
</html>
