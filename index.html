<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bridge Mail — A Raven Finds You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #000000;
      --text:     #c8b888;
      --bright:   #ede0b8;
      --gold:     #d4a830;
      --gold-dk:  #9a7818;
      --dim:      #3a2c18;
      --muted:    #705840;
      --green:    #48a848;
      --red:      #c04030;
      --blue:     #5090cc;
      --white:    #f0e8d0;
    }

    html, body { min-height: 100dvh; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 56px;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,.06) 2px,
        rgba(0,0,0,.06) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ════════════════════════════
       SENDER VIEW
    ════════════════════════════ */

    #sender-view {
      width: 100%;
      max-width: 460px;
    }

    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(13px, 4vw, 18px);
      color: var(--gold);
      text-align: center;
      line-height: 2;
      margin-bottom: 4px;
      text-shadow: 0 0 24px rgba(212,168,48,.4);
    }

    .logo-sub {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    .logo-rule {
      border: none;
      border-top: 1px solid var(--dim);
      margin: 24px 0 32px;
    }

    .s-lbl {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .s-field { margin-bottom: 24px; }

    select {
      width: 100%;
      background: #000;
      border: 1px solid var(--dim);
      border-radius: 0;
      color: var(--bright);
      font-family: 'Courier New', monospace;
      font-size: 14px;
      padding: 11px 12px;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color .12s;
    }
    select:focus { outline: none; border-color: var(--gold); }
    select option { background: #0d0d0d; }

    .forge-btn {
      width: 100%;
      padding: 15px;
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: background .12s, color .12s, box-shadow .12s;
      margin-bottom: 28px;
      line-height: 2;
    }
    .forge-btn:hover {
      background: var(--gold);
      color: #000;
      box-shadow: 0 0 20px rgba(212,168,48,.3);
    }

    #link-result {
      border: 1px solid var(--dim);
      padding: 18px;
      animation: fadeUp .4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .res-lbl {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .res-url {
      font-size: 11px;
      color: var(--blue);
      word-break: break-all;
      line-height: 1.7;
      margin-bottom: 14px;
    }

    #copy-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: border-color .12s, color .12s;
    }
    #copy-btn:hover { border-color: var(--gold); color: var(--gold); }
    #copy-btn.ok    { border-color: var(--green); color: var(--green); }

    /* ════════════════════════════
       RPG VIEW
    ════════════════════════════ */

    #rpg-view {
      width: 100%;
      max-width: 580px;
    }

    /* Scene wrapper animation */
    .scene-enter {
      animation: fadeUp .45s ease;
    }

    /* Header */
    .sc-eyebrow {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .sc-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(11px, 3.5vw, 16px);
      color: var(--gold);
      line-height: 1.9;
      margin-bottom: 28px;
      text-shadow: 0 0 18px rgba(212,168,48,.3);
    }

    .sc-hr {
      border: none;
      border-top: 1px solid var(--dim);
      margin: 24px 0;
    }

    /* Text blocks */
    .sc-text {
      font-size: 14px;
      line-height: 2.2;
      color: var(--text);
      white-space: pre-line;
      margin-bottom: 18px;
    }

    .sc-speech {
      font-size: 13px;
      line-height: 2.1;
      color: var(--white);
      font-style: italic;
      border-left: 3px solid var(--muted);
      padding: 6px 0 6px 18px;
      margin: 20px 0;
      white-space: pre-line;
    }

    .sc-inscription {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(7px, 2.2vw, 10px);
      color: var(--gold);
      line-height: 2.4;
      text-align: center;
      letter-spacing: 3px;
      border: 1px solid var(--dim);
      padding: 18px 14px;
      margin: 24px 0;
      text-shadow: 0 0 12px rgba(212,168,48,.25);
      white-space: pre-line;
    }

    /* Blinking cursor */
    .cursor-blink {
      display: inline-block;
      width: 9px;
      height: 1em;
      background: var(--gold);
      vertical-align: text-bottom;
      animation: blink .75s step-end infinite;
      margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Options */
    #scene-opts {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .opt {
      width: 100%;
      padding: 14px 16px;
      background: transparent;
      border: 1px solid var(--dim);
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.7;
      text-align: left;
      cursor: pointer;
      transition: border-color .1s, background .1s, color .1s;
      position: relative;
    }
    .opt::before  { content: '▶  '; color: var(--muted); }
    .opt:hover:not(:disabled) {
      border-color: var(--gold);
      background: rgba(212,168,48,.06);
      color: var(--bright);
    }
    .opt:hover:not(:disabled)::before { color: var(--gold); }

    .opt.correct            { border-color: var(--green); color: var(--green); pointer-events: none; }
    .opt.correct::before    { color: var(--green); content: '✓  '; }
    .opt.wrong              { border-color: var(--red);   color: var(--red);   pointer-events: none; }
    .opt.wrong::before      { color: var(--red);   content: '✗  '; }
    .opt.dimmed             { opacity: .25; pointer-events: none; }

    /* Feedback */
    #scene-feedback {
      margin-top: 18px;
      font-size: 13px;
      line-height: 2.1;
      font-style: italic;
      white-space: pre-line;
      min-height: 26px;
    }
    #scene-feedback.pos { color: var(--green); }
    #scene-feedback.neg { color: var(--red); }

    /* Next / Action button */
    .next-btn {
      display: block;
      width: 100%;
      padding: 15px;
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background .12s, color .12s, box-shadow .12s;
      animation: fadeUp .35s ease;
      line-height: 2;
    }
    .next-btn:hover {
      background: var(--gold);
      color: #000;
      box-shadow: 0 0 20px rgba(212,168,48,.25);
    }

    /* ════════════════════════════
       REVELATION
    ════════════════════════════ */

    .rev-lbl {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .rev-bridge {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(13px, 4.5vw, 22px);
      color: var(--gold);
      line-height: 1.9;
      margin-bottom: 32px;
      text-shadow: 0 0 28px rgba(212,168,48,.45);
    }

    .rev-time-lbl {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .rev-time {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(22px, 8vw, 44px);
      color: var(--bright);
      letter-spacing: 8px;
      margin-bottom: 36px;
      text-shadow: 0 0 24px rgba(237,224,184,.2);
    }

    .rev-wiki {
      font-size: 13px;
      line-height: 2.1;
      color: var(--muted);
      white-space: pre-line;
    }

    .rev-map {
      display: block;
      width: 100%;
      padding: 15px;
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: 2px;
      text-align: center;
      text-decoration: none;
      transition: background .12s, color .12s, box-shadow .12s;
      cursor: pointer;
      margin-bottom: 12px;
      line-height: 2;
    }
    .rev-map:hover {
      background: var(--gold);
      color: #000;
      box-shadow: 0 0 20px rgba(212,168,48,.25);
    }

    .rev-footer {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--dim);
      text-align: center;
      letter-spacing: 3px;
      margin-top: 32px;
      line-height: 2.5;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: .4; }
      50%       { opacity: 1;  }
    }

    /* Skip hint */
    .skip-hint {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: var(--dim);
      text-align: right;
      letter-spacing: 2px;
      margin-top: 10px;
      margin-bottom: -4px;
      animation: blink 1.8s step-end infinite;
    }
  </style>
</head>
<body>

<!-- ══ SENDER ══ -->
<div id="sender-view">
  <div class="logo">🌉 BRIDGE MAIL</div>
  <div class="logo-sub">— Send a Raven —</div>
  <hr class="logo-rule">

  <div class="s-field">
    <div class="s-lbl">Choose the crossing</div>
    <select id="bridge-sel">
      <option value="">— Select a bridge —</option>
    </select>
  </div>

  <div class="s-field">
    <div class="s-lbl">Hour of meeting</div>
    <select id="time-sel">
      <option value="">— Select a time —</option>
    </select>
  </div>

  <button class="forge-btn" id="generate-btn">⚔ &nbsp;FORGE THE SUMMONS</button>

  <div id="link-result" style="display:none">
    <div class="res-lbl">The raven is ready</div>
    <div class="res-url" id="res-url"></div>
    <button id="copy-btn">✉ &nbsp;Copy Summons &amp; Link</button>
  </div>
</div>

<!-- ══ RPG VIEW ══ -->
<div id="rpg-view" style="display:none">
  <div id="scene-wrap"></div>
</div>

<script>
'use strict';

/* ══════════════════════════════════════════
   DATA
══════════════════════════════════════════ */
const BRIDGES = [
  { name:'Vasabron',            wiki:'Vasabron',             maps:'https://maps.app.goo.gl/JJYS38JAxVi4h6tx7' },
  { name:'Skeppsholmsbron',     wiki:'Skeppsholmsbron',      maps:'https://maps.app.goo.gl/dc441PBre7dkrmqr6' },
  { name:'Blekholmsbron',       wiki:'Blekholmsbron',        maps:'https://maps.app.goo.gl/TWeub8jaRdsu2C6aA' },
  { name:'Barnhusbron',         wiki:'Barnhusbron',          maps:'https://maps.app.goo.gl/kG8Q4JPWbYiu7cyi8' },
  { name:'St Eriksbron',        wiki:'Sankt_Eriksbron',      maps:'https://maps.app.goo.gl/LjcqGjKRR5YBFyQVA' },
  { name:'Djurgårdsbron',       wiki:'Djurgårdsbron',        maps:'https://maps.app.goo.gl/x6aWENTWM1MufGjr7' },
  { name:'Lilla Sjötullsbron',  wiki:'Lilla_Sjötullsbron',   maps:'https://maps.app.goo.gl/Fp9VpiSRtqtmTHyb8' },
  { name:'Västerbron',          wiki:'Västerbron',           maps:'https://maps.app.goo.gl/3GySvR9T9bJSBLYg7' },
  { name:'Malmskillnadsbron',   wiki:'Malmskillnadsbron',    maps:'https://maps.app.goo.gl/9kBg8a3XnYKyecoW8' },
  { name:'Årstabroarna',        wiki:'Årstabroarna',         maps:'https://maps.app.goo.gl/uSQSVW8D57UFaGyC7' },
  { name:'Reimersholmebron',    wiki:'Reimersholmsbron',     maps:'https://maps.app.goo.gl/oTMqUDwRFgyP1xqB8' },
  { name:'Långholmsbron',       wiki:'Långholmsbron',        maps:'https://maps.app.goo.gl/p6xW4ih88ibEzvde9' },
  { name:'Liljeholmsbron',      wiki:'Liljeholmsbron',       maps:'https://maps.app.goo.gl/4cpSFn3xfK1Eum8r5' },
  { name:'Danviksbro',          wiki:'Danviksbro',           maps:'https://maps.app.goo.gl/htRZR6vibqeeb3HX6' },
  { name:'Strömbron',           wiki:'Strömbron',            maps:'https://maps.app.goo.gl/2aAX4ugfx41rUPPj9' },
  { name:'Norrbro',             wiki:'Norrbro',              maps:'https://maps.app.goo.gl/fxtTQQEv6612RMUK6' },
  { name:'Stadshusbro',         wiki:'Stadshusbron',         maps:'https://maps.app.goo.gl/ChPDJDY7nov14r617' },
  { name:'Drottingholmsbron',   wiki:'Drottningholm',        maps:'https://maps.app.goo.gl/xFXNXyrRMLNcfX4ZA' },
  { name:'Nockebybron',         wiki:'Nockebybron',          maps:'https://maps.app.goo.gl/HwzjCq9CeRRYJ9vV9' },
];

const TIMES = (() => {
  const t = [];
  for (let h = 6; h <= 23; h++) {
    t.push(`${String(h).padStart(2,'0')}:00`);
    if (h < 23) t.push(`${String(h).padStart(2,'0')}:30`);
  }
  return t;
})();

const BASE_URL_OVERRIDE = 'https://codefean.github.io/bridge-mail/';

function getBaseUrl() {
  if (BASE_URL_OVERRIDE) return BASE_URL_OVERRIDE.replace(/\?.*$/, '').replace(/\/$/, '');
  const href = location.href;
  if (href.startsWith('about:') || href.startsWith('blob:')) return null;
  return href.replace(/\?.*$/, '');
}

/* ══════════════════════════════════════════
   ROUTING
══════════════════════════════════════════ */
const qp = new URLSearchParams(location.search);
const qb = qp.get('b'), qt = qp.get('t');
const bi = parseInt(qb);

if (qb !== null && qt !== null && !isNaN(bi) && BRIDGES[bi]) {
  document.getElementById('sender-view').style.display = 'none';
  document.getElementById('rpg-view').style.display    = 'block';
  initRPG(bi, qt);
} else {
  initSender();
}

/* ══════════════════════════════════════════
   SENDER
══════════════════════════════════════════ */
function initSender() {
  const bSel = document.getElementById('bridge-sel');
  const tSel = document.getElementById('time-sel');

  BRIDGES.forEach((b, i) => bSel.add(new Option(b.name, i)));
  TIMES.forEach(t => tSel.add(new Option(t, t)));

  let shareMsg = '';

  document.getElementById('generate-btn').onclick = () => {
    if (!bSel.value || !tSel.value) {
      alert('Choose both a bridge and an hour of meeting.');
      return;
    }
    const base = getBaseUrl();
    const name = BRIDGES[parseInt(bSel.value)].name;

    if (!base) {
      document.getElementById('res-url').textContent =
        '⚠ Deploy to GitHub Pages first. Link preview: https://yourname.github.io/bridge-mail/?b=' +
        bSel.value + '&t=' + encodeURIComponent(tSel.value);
      document.getElementById('link-result').style.display = 'block';
      shareMsg = '';
      return;
    }

    const url = `${base}?b=${bSel.value}&t=${encodeURIComponent(tSel.value)}`;
    shareMsg   = `A raven bears this for you.\n\nFollow the link, answer the trials, and you shall know where to find me.\n\n${url}`;

    document.getElementById('res-url').textContent = url;
    document.getElementById('link-result').style.display = 'block';
  };

  document.getElementById('copy-btn').onclick = async () => {
    if (!shareMsg) return;
    const btn = document.getElementById('copy-btn');
    try {
      await navigator.clipboard.writeText(shareMsg);
    } catch {
      const ta = Object.assign(document.createElement('textarea'), { value: shareMsg });
      Object.assign(ta.style, { position:'fixed', opacity:'0' });
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand('copy'); ta.remove();
    }
    btn.textContent = '✓  Raven Dispatched!';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = '✉ \u00a0Copy Summons & Link'; btn.classList.remove('ok'); }, 2600);
  };
}

/* ══════════════════════════════════════════
   RPG ENGINE
══════════════════════════════════════════ */
function initRPG(bIdx, time) {
  const bridge = BRIDGES[bIdx];
  let wikiText = null;
  let sceneIdx  = 0;
  let skipFlag  = false;

  // Pre-fetch wiki immediately
  fetchWiki(bridge.wiki).then(t => { wikiText = t; });

  const wrap = document.getElementById('scene-wrap');

  /* ── Scene definitions ────────────────────── */
  const SCENES = [

    /* 0 — PROLOGUE */
    {
      eyebrow: '',
      title:   'A RAVEN FINDS YOU',
      content: [
        { type:'text',
          text:'A black raven lands upon the sill at dusk, as the last light bleeds out of the sky.\n\nBound to its leg: a scroll, sealed in dark wax, stamped with no name or sigil.' },
        { type:'text',
          text:'You break the seal. The parchment is brief.' },
        { type:'speech',
          text:'"A rendezvous awaits you at the water. But the crossing must be earned — not given.\n\nThree trials stand between you and the knowing.\n\nProve yourself worthy, wanderer."' },
        { type:'text',
          text:'The raven holds your gaze a moment longer than feels natural.\n\nThen it is gone.' },
      ],
      action: { label:'▶  BEGIN THE JOURNEY', next:1 },
    },

    /* 1 — TRIAL I */
    {
      eyebrow: 'TRIAL I OF III',
      title:   'THE FERRYMAN\'S RIDDLE',
      content: [
        { type:'text',
          text:'The road narrows until it meets a black river. No boat. No ferryman in sight — only an old man hunched on a mossy stone, smoking a short clay pipe, watching the water.\n\nHe does not look up as you approach.' },
        { type:'speech',
          text:'"I\'ve carried thousands across this river," he says. "Most never stop to think how I do it. They just walk." He pauses to tap ash from the pipe. "But you\'ll need to understand the crossing. Answer me this:"' },
        { type:'speech',
          text:'"I stand between two shores, holding nothing in my hands, yet I carry all who cross. I endure storm, flood and silence alike. I ask for nothing. What am I?"' },
      ],
      options: [
        {
          text:    'A boatman.',
          correct: false,
          response:'He spits slowly into the current. "A boatman tires. A boatman drowns. I have stood since before your grandfather\'s grandfather drew his first breath."\n\nHe looks at you with patient eyes. "Try again."',
        },
        {
          text:    'A bridge.',
          correct: true,
          response:'A slow smile crosses his weathered face. He does not speak immediately — he lets the silence confirm it.\n\n"Aye. Most would say *boat*. Few think of what endures." He rises from the stone and gestures down the bank. "The path continues ahead."',
        },
        {
          text:    'The river itself.',
          correct: false,
          response:'"The river answers to no one," he mutters. "It takes, it moves, it does not carry by choice."\n\nHe resettles on the stone and says nothing more. The implication is clear: try again.',
        },
      ],
    },

    /* 2 — TRIAL II */
    {
      eyebrow: 'TRIAL II OF III',
      title:   'THE WEIGHT OF THE ROAD',
      content: [
        { type:'text',
          text:'The road climbs into grey hills and the air grows cold. At a ruined waypost — one of the old stone markers, half-sunk into the earth — a traveller sits in the mud.\n\nOlder. Road-worn. Boot torn through at the sole, water-skin empty and crumpled.' },
        { type:'text',
          text:'They look up as you pass. There is no begging in their eyes. Only the quiet, exhausted dignity of someone who has fallen far and knows it.' },
        { type:'speech',
          text:'"I ask for nothing," they say. "Only water, if you have some to spare."' },
        { type:'text',
          text:'You have just enough for yourself. Someone is waiting for you at journey\'s end.\n\nThe road does not grow shorter while you stand here.' },
      ],
      options: [
        {
          text:    'Give the water — honour demands no less.',
          anyCorrect: true,
          response:'You hand over the skin without hesitation. The traveller drinks deeply, then holds it back out to you. You wave it off.\n\n"May your road be kinder than mine," they say.\n\nYou walk on — thirstier now, but somehow lighter for it.',
        },
        {
          text:    'Leave your last few coins and press on.',
          anyCorrect: true,
          response:'You press the coins into their hand and keep moving. Not everything they need — but something.\n\n"I\'ll manage," they say quietly.\n\nYou carry on with a practical conscience and an empty purse.',
        },
        {
          text:    'Describe the nearest shelter and move on.',
          anyCorrect: true,
          response:'You explain clearly: two hills east, a cottage with a blue door. The traveller listens carefully, nods, repeats the directions back to confirm.\n\n"That\'ll do," they say.\n\nSometimes words are enough. You move on with purpose.',
        },
      ],
    },

    /* 3 — TRIAL III */
    {
      eyebrow: 'TRIAL III OF III',
      title:   'THE ARCH OF OATHS',
      content: [
        { type:'text',
          text:'The path descends at last toward water. You can hear it — the cold sound of a river, the damp smell of stone and current and distance.\n\nBut the crossing has one last gatehouse.' },
        { type:'text',
          text:'A weathered arch stands alone in the evening half-light, older than the road itself, older perhaps than the city you are walking toward. The stone is dark. The words carved into it have been worn smooth by centuries of passing hands.' },
        { type:'inscription',
          text:'"WHAT DO YOU CARRY\nACROSS?"' },
        { type:'text',
          text:'It is not a riddle.\n\nIt is an oath.' },
      ],
      options: [
        {
          text:    'My word. Nothing more.',
          anyCorrect: true,
          response:'The stone is silent for a long moment.\n\nThen, somewhere deep within it, something shifts — a settling, like a held breath finally released. The arch holds no magic. But oaths have their own weight.\n\nYou step through.',
        },
        {
          text:    'Whatever the crossing demands of me.',
          anyCorrect: true,
          response:'The stone does not answer.\n\nBut the path beyond the arch looks clearer than it did before — the way forward obvious and unobstructed.\n\nYou step through.',
        },
        {
          text:    'An open heart and enough patience.',
          anyCorrect: true,
          response:'The air around the arch changes — quieter, steadier. As if the world drew in half a breath and held it.\n\nThe stone says nothing. But it does not stop you.\n\nYou step through.',
        },
      ],
    },

    /* 4 — REVELATION */
    { type:'revelation' },

  ];

  /* ── Utilities ──────────────────────────── */

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  async function typeEl(el, text, speed = 15) {
    el.textContent = '';
    const cursor = document.createElement('span');
    cursor.className = 'cursor-blink';
    el.appendChild(cursor);

    let built = '';
    for (const ch of text) {
      if (skipFlag) { el.textContent = text; return; }
      built += ch;
      el.textContent = built;
      el.appendChild(cursor);
      await sleep(ch === '\n' ? 85 : speed);
    }
    el.textContent = text;
  }

  /* ── Scene renderer ─────────────────────── */

  function renderScene(idx) {
    skipFlag = false;
    const scene = SCENES[idx];

    if (scene.type === 'revelation') { renderRevelation(); return; }

    wrap.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'scene-enter';
    wrap.appendChild(div);

    // Header
    if (scene.eyebrow) {
      const ey = document.createElement('div');
      ey.className = 'sc-eyebrow';
      ey.textContent = scene.eyebrow;
      div.appendChild(ey);
    }
    const titleEl = document.createElement('div');
    titleEl.className = 'sc-title';
    titleEl.textContent = scene.title;
    div.appendChild(titleEl);

    const hr = document.createElement('hr');
    hr.className = 'sc-hr';
    div.appendChild(hr);

    const contentArea = document.createElement('div');
    div.appendChild(contentArea);

    // Skip hint
    const hint = document.createElement('div');
    hint.className = 'skip-hint';
    hint.textContent = 'TAP TO SKIP ▶';
    div.appendChild(hint);

    let typingDone = false;
    const skipTyping = () => { if (!typingDone) skipFlag = true; };
    wrap.addEventListener('click', skipTyping);

    (async () => {
      for (const block of scene.content) {
        await sleep(skipFlag ? 0 : 220);

        let el;
        if (block.type === 'text') {
          el = document.createElement('p'); el.className = 'sc-text';
        } else if (block.type === 'speech') {
          el = document.createElement('div'); el.className = 'sc-speech';
        } else if (block.type === 'inscription') {
          el = document.createElement('div'); el.className = 'sc-inscription';
        }
        contentArea.appendChild(el);

        const spd = block.type === 'inscription' ? 24 : 15;
        await typeEl(el, block.text, skipFlag ? 0 : spd);
        await sleep(skipFlag ? 0 : 280);
      }

      typingDone = true;
      hint.remove();
      wrap.removeEventListener('click', skipTyping);

      if (scene.options) renderOptions(div, scene);
      else if (scene.action) renderAction(div, scene.action);
    })();
  }

  /* ── Options ────────────────────────────── */

  function renderOptions(parent, scene) {
    const optsDiv = document.createElement('div');
    optsDiv.id = 'scene-opts';
    parent.appendChild(optsDiv);

    const feedback = document.createElement('div');
    feedback.id = 'scene-feedback';
    parent.appendChild(feedback);

    let answered = false;
    let locked   = false;

    scene.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'opt';
      btn.textContent = opt.text;
      optsDiv.appendChild(btn);

      btn.onclick = async () => {
        if (locked || answered || btn.classList.contains('wrong')) return;

        const isCorrect = opt.correct === true || opt.anyCorrect === true;
        locked = true;

        if (isCorrect) {
          answered = true;
          btn.classList.add('correct');
          optsDiv.querySelectorAll('.opt:not(.correct)').forEach(b => b.classList.add('dimmed'));
          feedback.className = 'pos';
          feedback.textContent = '';
          skipFlag = false;

          await typeEl(feedback, opt.response, 13);

          // Next button
          const nb = document.createElement('button');
          nb.className = 'next-btn';
          nb.style.marginTop = '28px';
          nb.textContent = sceneIdx >= 3 ? '▶  APPROACH THE CROSSING' : '▶  CONTINUE THE JOURNEY';
          parent.appendChild(nb);
          nb.onclick = () => { sceneIdx++; renderScene(sceneIdx); };

          locked = false;
        } else {
          // Wrong — allow retry
          btn.classList.add('wrong');
          feedback.className = 'neg';
          feedback.textContent = '';
          skipFlag = false;
          await typeEl(feedback, opt.response, 13);
          locked = false;
        }
      };
    });
  }

  /* ── Action button (prologue only) ─────── */

  function renderAction(parent, action) {
    const btn = document.createElement('button');
    btn.className = 'next-btn';
    btn.style.marginTop = '28px';
    btn.textContent = action.label;
    parent.appendChild(btn);
    btn.onclick = () => { sceneIdx = action.next; renderScene(sceneIdx); };
  }

  /* ── Revelation ─────────────────────────── */

  async function renderRevelation() {
    wrap.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'scene-enter';
    wrap.appendChild(div);

    skipFlag = false;

    // Header
    const ey = document.createElement('div');
    ey.className = 'sc-eyebrow';
    ey.textContent = 'THE CROSSING REVEALS ITSELF';
    div.appendChild(ey);

    const titleEl = document.createElement('div');
    titleEl.className = 'sc-title';
    titleEl.textContent = 'YOU ARE WORTHY';
    div.appendChild(titleEl);

    const hr = document.createElement('hr'); hr.className = 'sc-hr'; div.appendChild(hr);

    // Skip handler — only for typing portion
    let revTypingDone = false;
    const skipRev = () => { if (!revTypingDone) skipFlag = true; };
    wrap.addEventListener('click', skipRev);

    const hint = document.createElement('div');
    hint.className = 'skip-hint';
    div.appendChild(hint);
    hint.textContent = 'TAP TO SKIP ▶';

    // Intro
    const intro = document.createElement('p'); intro.className = 'sc-text'; div.appendChild(intro);
    await typeEl(intro, 'The trials are complete.\n\nThe path ahead is clear.\n\nYou have earned what was hidden.', skipFlag ? 0 : 15);
    await sleep(skipFlag ? 0 : 500);

    const hr2 = document.createElement('hr'); hr2.className = 'sc-hr'; div.appendChild(hr2);

    // ── Bridge name ──
    const brLbl = document.createElement('div'); brLbl.className = 'rev-lbl'; div.appendChild(brLbl);
    await typeEl(brLbl, 'THE PLACE OF MEETING', skipFlag ? 0 : 20);
    await sleep(skipFlag ? 0 : 200);

    const brEl = document.createElement('div'); brEl.className = 'rev-bridge'; div.appendChild(brEl);
    await typeEl(brEl, bridge.name, skipFlag ? 0 : 55);
    await sleep(skipFlag ? 0 : 700);

    // ── Time ──
    const tmLbl = document.createElement('div'); tmLbl.className = 'rev-time-lbl'; div.appendChild(tmLbl);
    await typeEl(tmLbl, 'AT THE HOUR OF', skipFlag ? 0 : 20);
    await sleep(skipFlag ? 0 : 200);

    const tmEl = document.createElement('div'); tmEl.className = 'rev-time'; div.appendChild(tmEl);
    await typeEl(tmEl, time, skipFlag ? 0 : 75);
    await sleep(skipFlag ? 0 : 700);

    const hr3 = document.createElement('hr'); hr3.className = 'sc-hr'; div.appendChild(hr3);

    // ── Wiki ──
    const wLbl = document.createElement('div');
    wLbl.className = 'sc-eyebrow';
    wLbl.style.marginBottom = '14px';
    wLbl.textContent = 'OF THIS PLACE, IT IS WRITTEN:';
    div.appendChild(wLbl);

    const wEl = document.createElement('div'); wEl.className = 'rev-wiki'; div.appendChild(wEl);

    const wikiContent = wikiText || await fetchWiki(bridge.wiki);
    wikiText = wikiContent;

    revTypingDone = true;
    hint.remove();
    wrap.removeEventListener('click', skipRev);

    await typeEl(wEl, wikiContent, skipFlag ? 0 : 7);

    const hr4 = document.createElement('hr'); hr4.className = 'sc-hr'; div.appendChild(hr4);

    // Maps link
    const mapA = document.createElement('a');
    mapA.className = 'rev-map';
    mapA.href = bridge.maps;
    mapA.target = '_blank';
    mapA.rel = 'noopener noreferrer';
    mapA.textContent = '📍  OPEN IN MAPS';
    div.appendChild(mapA);

    // Footer
    const footer = document.createElement('div');
    footer.className = 'rev-footer';
    footer.textContent = 'Do not be late.';
    div.appendChild(footer);
  }

  /* ── Start ──────────────────────────────── */
  renderScene(0);
}

/* ══════════════════════════════════════════
   WIKIPEDIA FETCH
══════════════════════════════════════════ */
async function fetchWiki(title) {
  try {
    const r = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`
    );
    if (!r.ok) throw 0;
    const d = await r.json();
    return d.extract || 'No record of this crossing remains in the old texts.';
  } catch {
    return 'The ancient records of this bridge were lost to time and water. Seek it out for yourself.';
  }
}
</script>
