<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>YOUVE BEEN SUMMONED BY THE RAT KING</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #000000;
      --text:     #8cba8c;
      --bright:   #cce8cc;
      --green:    #48a848;
      --green-dk: #2d7a2d;
      --dim:      #182a18;
      --muted:    #486848;
      --red:      #c04030;
      --blue:     #5090cc;
      --white:    #e0f0e0;
      --gold:     #30d487;
    }

    html, body { min-height: 100dvh; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 56px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,.06) 2px,
        rgba(0,0,0,.06) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    #sender-view {
      width: 100%;
      max-width: 500px;
    }

    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(13px, 4vw, 18px);
      color: var(--green);
      text-align: center;
      line-height: 2;
      margin-bottom: 4px;
      text-shadow: 0 0 24px rgba(212,168,48,.4);
    }

    .logo-sub {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    .logo-rule {
      border: none;
      border-top: 1px solid var(--dim);
      margin: 24px 0 32px;
    }

    .s-lbl {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .s-field { margin-bottom: 22px; }

    input, select {
      width: 100%;
      background: #000;
      border: 1px solid var(--dim);
      border-radius: 0;
      color: var(--bright);
      font-family: 'Courier New', monospace;
      font-size: 14px;
      padding: 12px;
      transition: border-color .12s;
    }

    input:focus, select:focus { outline: none; border-color: var(--green); }
    select option { background: #0d0d0d; }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      margin-top: 8px;
    }

    .forge-btn, .next-btn, .rev-map {
      width: 100%;
      padding: 15px;
      background: transparent;
      border: 2px solid var(--green);
      color: var(--green);
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: background .12s, color .12s, box-shadow .12s;
      margin-bottom: 28px;
      line-height: 2;
      text-align: center;
      text-decoration: none;
      display: block;
    }

    .forge-btn:hover, .rev-map:hover {
      background: var(--green);
      color: #000;
      box-shadow: 0 0 20px rgba(72,168,72,.3);
    }

    #link-result {
      border: 1px solid var(--dim);
      padding: 18px;
      animation: fadeUp .4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .res-lbl {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .res-url {
      font-size: 11px;
      color: var(--blue);
      word-break: break-all;
      line-height: 1.7;
      margin-bottom: 14px;
    }

    .copy-row {
      display: grid;
      gap: 10px;
    }

    #copy-btn, #sms-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: border-color .12s, color .12s;
      text-decoration: none;
      text-align: center;
    }

    #copy-btn:hover, #sms-btn:hover { border-color: var(--green); color: var(--green); }
    #copy-btn.ok { border-color: var(--green); color: var(--green); }

    #rpg-view {
      width: 100%;
      max-width: 580px;
    }

    .scene-enter { animation: fadeUp .45s ease; }

    .sc-eyebrow {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .sc-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(11px, 3.5vw, 16px);
      color: var(--green);
      line-height: 1.9;
      margin-bottom: 28px;
      text-shadow: 0 0 18px rgba(212,168,48,.3);
    }

    .sc-hr {
      border: none;
      border-top: 1px solid var(--dim);
      margin: 24px 0;
    }

    .sc-text {
      font-size: 14px;
      line-height: 2.2;
      color: var(--text);
      white-space: pre-line;
      margin-bottom: 18px;
    }

    .sc-speech {
      font-size: 13px;
      line-height: 2.1;
      color: var(--white);
      font-style: italic;
      border-left: 3px solid var(--muted);
      padding: 6px 0 6px 18px;
      margin: 20px 0;
      white-space: pre-line;
    }

    .sc-inscription {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(7px, 2.2vw, 10px);
      color: var(--green);
      line-height: 2.4;
      text-align: center;
      letter-spacing: 3px;
      border: 1px solid var(--dim);
      padding: 18px 14px;
      margin: 24px 0;
      text-shadow: 0 0 12px rgba(212,168,48,.25);
      white-space: pre-line;
    }

    .cursor-blink {
      display: inline-block;
      width: 9px;
      height: 1em;
      background: var(--green);
      vertical-align: text-bottom;
      animation: blink .75s step-end infinite;
      margin-left: 1px;
    }

    @keyframes blink { 50% { opacity: 0; } }

    #scene-opts {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .opt {
      width: 100%;
      padding: 14px 16px;
      background: transparent;
      border: 1px solid var(--dim);
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.7;
      text-align: left;
      cursor: pointer;
      transition: border-color .1s, background .1s, color .1s;
      position: relative;
    }

    .opt::before  { content: '▶  '; color: var(--muted); }
    .opt:hover:not(:disabled) {
      border-color: var(--green);
      background: rgba(212,168,48,.06);
      color: var(--bright);
    }
    .opt:hover:not(:disabled)::before { color: var(--green); }
    .opt.correct { border-color: var(--green); color: var(--green); pointer-events: none; }
    .opt.correct::before { color: var(--green); content: '✓  '; }
    .opt.dimmed { opacity: .25; pointer-events: none; }

    #scene-feedback {
      margin-top: 18px;
      font-size: 13px;
      line-height: 2.1;
      font-style: italic;
      white-space: pre-line;
      min-height: 26px;
      color: var(--green);
    }

    .next-btn {
      border-color: var(--green);
      color: var(--green);
      animation: fadeUp .35s ease;
      margin-top: 28px;
    }

    .next-btn:hover {
      background: var(--green);
      color: #000;
      box-shadow: 0 0 20px rgba(212,168,48,.25);
    }

    .rev-card {
      border: 1px solid var(--dim);
      padding: 18px;
      margin: 18px 0 26px;
    }

    .rev-lbl {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .rev-big {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(13px, 4.5vw, 22px);
      color: var(--green);
      line-height: 1.9;
      margin-bottom: 22px;
      text-shadow: 0 0 28px rgba(212,168,48,.45);
      word-break: break-word;
    }

    .rev-time {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(16px, 5vw, 28px);
      color: var(--bright);
      line-height: 1.8;
      margin-bottom: 22px;
      text-shadow: 0 0 24px rgba(237,224,184,.2);
    }

    .rev-footer {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--dim);
      text-align: center;
      letter-spacing: 3px;
      margin-top: 32px;
      line-height: 2.5;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: .4; }
      50% { opacity: 1; }
    }

    .skip-hint {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: var(--dim);
      text-align: right;
      letter-spacing: 2px;
      margin-top: 10px;
      margin-bottom: -4px;
      animation: blink 1.8s step-end infinite;
    }
  </style>
</head>
<body>

<div id="sender-view">
  <div class="logo">YOUVE BEEN SUMMONED</div>
  <div class="logo-sub">— complete the quest to know when & where —</div>
  <hr class="logo-rule">

  <div class="s-field">
    <div class="s-lbl">Recipient name</div>
    <input id="name-in" type="text" placeholder="e.g. Maya" autocomplete="off" />
  </div>

  <div class="s-field">
    <div class="s-lbl">Google Maps link</div>
    <input id="maps-in" type="url" placeholder="Paste a Google Maps link" inputmode="url" />
    <div class="hint">Short links like maps.app.goo.gl work. If the link contains a place name, the quest will show it too.</div>
  </div>

  <div class="s-field">
    <div class="s-lbl">Quest length</div>
    <select id="parts-sel">
      <option value="1">1 part — quick reveal</option>
      <option value="2">2 parts — medium quest</option>
      <option value="3" selected>3 parts — full quest</option>
    </select>
  </div>

  <div class="s-field">
    <div class="s-lbl">Date and time</div>
    <input id="datetime-in" type="datetime-local" />
  </div>

  <button class="forge-btn" id="generate-btn">⚔ &nbsp;FORGE THE QUEST</button>

  <div id="link-result" style="display:none">
    <div class="res-lbl">Your quest text is ready</div>
    <div class="res-url" id="res-url"></div>
    <div class="copy-row">
      <button id="copy-btn">✉ &nbsp;Copy Text &amp; Link</button>
      <a id="sms-btn" href="#">📱 &nbsp;Open Text Message</a>
    </div>
  </div>
</div>

<div id="rpg-view" style="display:none">
  <div id="scene-wrap"></div>
</div>

<script>
'use strict';

const BASE_URL_OVERRIDE = 'https://codefean.github.io/bridge-mail/';

function getBaseUrl() {
  if (BASE_URL_OVERRIDE) return BASE_URL_OVERRIDE.replace(/[?#].*$/, '');
  const href = location.href;
  if (href.startsWith('about:') || href.startsWith('blob:')) return null;
  return href.replace(/[?#].*$/, '');
}

function cleanName(name) {
  return (name || 'traveler').trim().slice(0, 40) || 'traveler';
}

function cleanParts(parts) {
  const n = Number(parts);
  return [1, 2, 3].includes(n) ? n : 3;
}

function makeQuestSeed() {
  if (window.crypto && crypto.getRandomValues) {
    const arr = new Uint32Array(2);
    crypto.getRandomValues(arr);
    return Array.from(arr).map(n => n.toString(36)).join('');
  }
  return `${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`;
}

function isProbablyMapsLink(url) {
  try {
    const u = new URL(url);
    return /(^|\.)google\./i.test(u.hostname) || /(^|\.)goo\.gl$/i.test(u.hostname) || /maps\.app\.goo\.gl$/i.test(u.hostname);
  } catch {
    return false;
  }
}

function formatQuestDate(dt) {
  if (!dt) return 'a time chosen by your summoner';
  const d = new Date(dt);
  if (Number.isNaN(d.getTime())) return dt;
  return new Intl.DateTimeFormat(undefined, {
    weekday: 'long',
    month: 'long',
    day: 'numeric',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  }).format(d);
}

function extractPlaceLabel(mapsUrl) {
  try {
    const u = new URL(mapsUrl);

    const directParams = ['q', 'query', 'destination', 'daddr'];
    for (const key of directParams) {
      const v = u.searchParams.get(key);
      if (v) return decodeURIComponent(v.replace(/\+/g, ' '));
    }

    const placeMatch = decodeURIComponent(u.pathname).match(/\/place\/([^/]+)/);
    if (placeMatch && placeMatch[1]) return placeMatch[1].replace(/\+/g, ' ');

    return '';
  } catch {
    return '';
  }
}

const qp = new URLSearchParams(location.search);
const quest = {
  name: cleanName(qp.get('n')),
  maps: qp.get('m') || '',
  parts: cleanParts(qp.get('p')),
  datetime: qp.get('dt') || '',
  seed: qp.get('s') || ''
};

if (quest.maps && quest.datetime) {
  document.getElementById('sender-view').style.display = 'none';
  document.getElementById('rpg-view').style.display = 'block';
  initRPG(quest);
} else {
  initSender();
}

function initSender() {
  const nameIn = document.getElementById('name-in');
  const mapsIn = document.getElementById('maps-in');
  const partsSel = document.getElementById('parts-sel');
  const datetimeIn = document.getElementById('datetime-in');

  let shareMsg = '';

  document.getElementById('generate-btn').onclick = () => {
    const recipient = cleanName(nameIn.value);
    const maps = mapsIn.value.trim();
    const parts = cleanParts(partsSel.value);
    const dt = datetimeIn.value;

    if (!recipient || !maps || !dt) {
      alert('Add a name, Google Maps link, and date/time.');
      return;
    }

    if (!isProbablyMapsLink(maps)) {
      const ok = confirm('This does not look like a Google Maps link. Use it anyway?');
      if (!ok) return;
    }

    const base = getBaseUrl();
    if (!base) {
      alert('Deploy the page first so it has a real URL to share.');
      return;
    }

    const params = new URLSearchParams({
      n: recipient,
      m: maps,
      p: String(parts),
      dt,
      s: makeQuestSeed()
    });

    const url = `${base}?${params.toString()}`;
    shareMsg = `${recipient}, a quest has been written for you.\n\nOpen this link, complete the trial${parts === 1 ? '' : 's'}, and your exact meeting place and time will be revealed:\n\n${url}`;

    document.getElementById('res-url').textContent = url;
    document.getElementById('sms-btn').href = `sms:?&body=${encodeURIComponent(shareMsg)}`;
    document.getElementById('link-result').style.display = 'block';
  };

  document.getElementById('copy-btn').onclick = async () => {
    if (!shareMsg) return;
    const btn = document.getElementById('copy-btn');
    try {
      await navigator.clipboard.writeText(shareMsg);
    } catch {
      const ta = Object.assign(document.createElement('textarea'), { value: shareMsg });
      Object.assign(ta.style, { position:'fixed', opacity:'0' });
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand('copy'); ta.remove();
    }
    btn.textContent = '✓  Quest Copied!';
    btn.classList.add('ok');
    setTimeout(() => {
      btn.textContent = '✉ \u00a0Copy Text & Link';
      btn.classList.remove('ok');
    }, 2400);
  };
}

function initRPG(quest) {
  const wrap = document.getElementById('scene-wrap');
  let sceneIdx = 0;
  let skipFlag = false;

  function hashString(str) {
    let h = 2166136261;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }

  function seededRandom(seedText) {
    let state = hashString(seedText || `${quest.name}|${quest.maps}|${quest.datetime}|${quest.parts}`);
    return function rand() {
      state += 0x6D2B79F5;
      let t = state;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function shuffleWithSeed(items, rand) {
    const arr = items.slice();
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  const TRIAL_POOL = [
    {
      title: 'THE TOLLKEEPER RAT OF THE BLACK RIVER',
      content: [
        { type:'text', text:'The road narrows until it meets a black, sluggish river. No boat. No ferry. Only an ancient rat in a tattered friar\'s robe, perched on a barrel, gnawing thoughtfully on a candle stub.' },
        { type:'speech', text:'"I stand between two shores, holding nothing in my paws, yet I carry all who cross. I endure flood, fog, plague rumors, and the occasional knight who forgets I exist. What am I?"' },
      ],
      options: [
        { text:'A ferry.', correct:false, response:'He bares his teeth. "Nah dawg that aint it. Try again."' },
        { text:'A bridge.', correct:true, response:'"Just so," he squeaks. "You grasp the crossing. Mildly unsettling that a mortal managed it, but proceed."' },
        { text:'The river itself.', correct:false, response:'"The river hides bones and grudges. A grim guess. Wrong."' },
      ],
    },
    {
      title: 'THE RAT KNIGHT OF THE FROSTED MOAT',
      content: [
        { type:'text', text:'The road climbs toward a frozen moat. A small rat with ill-fitting armor stands guard, whiskers crusted with ice, somehow still standing at perfect attention.' },
        { type:'speech', text:'"Traveler," the knight squeaks, "I ask for little. Only courage, kindness, and perhaps one strip of dried meat, if thou hast it. The cold gnaws as fiercely as I once did."' },
        { type:'text', text:'You have barely enough for yourself. The moat does not thaw while you stand there being morally examined by an armored rodent.' },
      ],
      options: [
        { text:'Give the rat knight your dried meat.', anyCorrect:true, response:'The knight salutes with his tiny sword. "A noble sacrifice." He devours it in one motion and stands taller. You regret nothing. Mostly.' },
        { text:'Point him toward the castle kitchens.', anyCorrect:true, response:'He listens with the focus of a battle-hardened scout. "Acceptable intelligence," he squeaks. The quest allows this.' },
        { text:'Offer him words of encouragement instead.', anyCorrect:true, response:'The knight nods solemnly. "Not meat, but not nothing." He marches onward with troubling confidence.' },
      ],
    },
    {
      title: 'THE WITCH OF THE CROOKED HOURGLASS',
      content: [
        { type:'text', text:'You enter a crumbling tower lined with hourglasses, each one running at a different speed. One has clearly given up entirely.' },
        { type:'speech', text:'"A quest is ruined not by curses," says the lesbian witch, stirring a cauldron that smells faintly of rat fur and burnt thyme, "but by a companion saying \'five more minutes\' while hunting for their cloak."' },
      ],
      options: [
        { text:'Swear to honor the appointed hour.', anyCorrect:true, response:'The hourglasses still themselves. One tiny grain of sand whispers, "finally, someone reliable."' },
        { text:'Swear never to say "almost there" falsely.', anyCorrect:true, response:'The cauldron bubbles approvingly. Somewhere, a raven sheds a single grateful tear.' },
        { text:'Vow to arrive mysteriously on time.', anyCorrect:true, response:'The witch accepts this loophole with visible suspicion, eyeing you over her crooked spectacles.' },
      ],
    },
    {
      title: 'THE THREE PORTALS OF THE HAUNTED FOREST',
      content: [
        { type:'text', text:'Three shimmering portals stand among the rotted trees. One hums with pale green light. One drips something that might be ichor. One is simply labeled, in claw-scratched runes, DO NOT.' },
        { type:'speech', text:'"Choose," whispers a voice (that sounds like Joseph Stalin) from the canopy. "But know this: every portal is judging the state of your boots."' },
      ],
      options: [
        { text:'Step through the "my parents are in a healthy loving relationship" portal.', anyCorrect:true, response:'You hear a chorus of people sing, "we don´t care". The path continues.' },
        { text:'Step through the "adandonment issues" portal.', anyCorrect:true, response:'Correct, somehow. You hear the faint whisper of a father figure, and proceed.' },
        { text:'Step through the "I have IBS" portal.', anyCorrect:true, response:'The runes gasp. "we all could tell." The portal opens immediately. Reverse psychology remains undefeated, even in a haunted forest.' },
      ],
    },
    {
      title: 'THE GOBLIN SCRIBE OF THE RAT COURT',
      content: [
        { type:'text', text:'A hunched goblin blocks the path with a scroll longer than his 3rd leg (at least 2cm). He wears cracked spectacles and the expression of someone who invented paperwork purely to torment travelers (he is German).' },
        { type:'speech', text:'"Before continuing, you must agree to the Terms of Passage. They are mostly curses, one binding oath, and a clause about not being a horse girl."' },
      ],
      options: [
        { text:'Sign without reading.', anyCorrect:true, response:'The goblin nods. "Standard procedure." You may have sold your shadow, but the haunted forest grows shorter ahead.' },
        { text:'Ask for the short version.', anyCorrect:true, response:'"Be brave. Show up. Do not lick cursed relics or peoples boyfriends." Reasonable enough, even by witch-court standards.' },
        { text:'Sign each line with dramatic flourish.', anyCorrect:true, response:'The goblin is moved to tears. No one has respected his scrollwork before. He used to be in an abusive relationship with an italian man.' },
      ],
    },
    {
      title: 'THE TROLL AT THE WITCH-WARDED BRIDGE',
      content: [
        { type:'text', text:'A troll in a moth-eaten warden\'s sash guards a bridge strung with bones, charms, and one suspiciously cheerful rat skull.' },
        { type:'speech', text:'"None pass without a curse check," he rumbles. "State your business, your intentions, and whether you\'re smuggling any forbidden hexes."' },
      ],
      options: [
        { text:'Declare peaceful but chaotic intentions with your Hinge match.', anyCorrect:true, response:'The troll brands your wrist with invisible rune-ink. "Chaotic, but properly warded. Proceed."' },
        { text:'Compliment the bridge\'s craftsmanship.', anyCorrect:true, response:'The bridge creaks bashfully. The troll wipes away a tear and steps aside.' },
        { text:'Swear not to wake the rat skull or hurt your Hinge match Sean physically.', anyCorrect:true, response:'The troll narrows his eyes. "Ambitious promise." Still, he lets you pass.' },
      ],
    },
    {
      title: 'THE ORACLE RAT OF TANGLED WHISKERS',
      content: [
        { type:'text', text:'A glowing rat skull rises from a mossy altar, whiskers crackling with faint blue sparks. It has clearly been listening to too many conflicting prophecies (Fox News).' },
        { type:'speech', text:'"Many squeak," says the Oracle. "Few decide. Can you withstand the sacred chaos of \'where does the haunted path even begin\'?"' },
      ],
      options: [
        { text:'Silence the chatter and trust the quest.', anyCorrect:true, response:'The skull hums approvingly. Peace is restored for approximately eight seconds.' },
        { text:'Declare one clear destination (Cleveand, Ohio) like a true hero.', anyCorrect:true, response:'The fog parts overhead. Somewhere, a cursed map blushes.' },
        { text:'Nod once, show your balls a little, and pass.', anyCorrect:true, response:'Illegal? Perhaps. Effective? Ancient scholars disagree, but the path opens.' },
      ],
    },
    {
      title: 'THE CART OF CURSED GRAIN',
      content: [
        { type:'text', text:'A cart of cursed grain breaks loose at the top of a ridge. At the bottom, five rat prosititutes argue fiercely about which witch makes the better chlamydia potion.' },
        { type:'text', text:'Beside you is a lever. Pulling it redirects the cart into a stall run by a hooded merchant who insists his enchanted cheese has "notes".' },
        { type:'inscription', text:'"WHOM DO YOU SAVE?"' },
      ],
      options: [
        { text:'Pull the lever. Save the rat whores.', anyCorrect:true, response:'The cart obliterates the cheese stall. A cloud of enchanted dairy mist rises into the night sky. You have saved lives and angered exactly one merchant.' },
        { text:'Do nothing. Let fate (rat jesus) take the wheel.', anyCorrect:true, response:'Fate immediately proves underqualified for cart-related decisions. The lesson is unclear, but the path continues.' },
      ],
    },
    {
      title: 'THE FINAL TURN BENEATH THE BLOOD MOON',
      content: [
        { type:'text', text:'The haunted path reaches its final bend. The air smells of rain, old magic, and something nearby that has clearly overdone the incense (probably from a white girl).' },
        { type:'speech', text:'"The destination is real," says the wind through the dead trees. "The reveal is earned. Step forward and try to look like you weren\'t confused by the effort a random guy put into this the whole way."' },
      ],
      options: [
        { text:'Step forward heroically.', anyCorrect:true, response:'Your silhouette against the blood moon is excellent (body is t). The quest has no notes.' },
        { text:'Text you mom.', anyCorrect:true, response:'She is confused, but happy you completed the quest. She asks to meet this "Sean" guy.' },
        { text:'Kill yourself.', anyCorrect:true, response:'You are brought back to life by the rat gods. You still have to go on a date with Sean. Sorry, I dont make the rules.' },
      ],
    },
  ];

  const rand = seededRandom(quest.seed);
  const selectedTrials = shuffleWithSeed(TRIAL_POOL, rand)
    .slice(0, quest.parts)
    .map((trial, i) => ({ ...trial, eyebrow: `TRIAL ${i + 1}` }));

  const SCENES = [
    {
      eyebrow: '',
      title: 'A QUEST FINDS YOU',
      content: [
        { type:'text', text:`${quest.name}, a message has arrived with your name written in bright green fire.` },
        { type:'speech', text:`"Complete ${quest.parts === 1 ? 'one trial' : quest.parts + ' trials'}, and the exact meeting place and time shall be revealed."` },
        { type:'text', text:'The map is sealed. The hour is hidden. The quest begins.' },
      ],
      action: { label:'▶  BEGIN THE QUEST', next:1 },
    },
    ...selectedTrials,
    { type:'revelation' },
  ];

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  async function typeEl(el, text, speed = 15) {
    el.textContent = '';
    const cursor = document.createElement('span');
    cursor.className = 'cursor-blink';
    el.appendChild(cursor);

    let built = '';
    for (const ch of text) {
      if (skipFlag) { el.textContent = text; return; }
      built += ch;
      el.textContent = built;
      el.appendChild(cursor);
      await sleep(ch === '\n' ? 85 : speed);
    }
    el.textContent = text;
  }

  function renderScene(idx) {
    skipFlag = false;
    const scene = SCENES[idx];

    if (scene.type === 'revelation') { renderRevelation(); return; }

    wrap.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'scene-enter';
    wrap.appendChild(div);

    if (scene.eyebrow) {
      const ey = document.createElement('div');
      ey.className = 'sc-eyebrow';
      ey.textContent = `${scene.eyebrow} OF ${quest.parts}`;
      div.appendChild(ey);
    }

    const titleEl = document.createElement('div');
    titleEl.className = 'sc-title';
    titleEl.textContent = scene.title;
    div.appendChild(titleEl);

    const hr = document.createElement('hr');
    hr.className = 'sc-hr';
    div.appendChild(hr);

    const contentArea = document.createElement('div');
    div.appendChild(contentArea);

    const hint = document.createElement('div');
    hint.className = 'skip-hint';
    hint.textContent = 'TAP TO SKIP ▶';
    div.appendChild(hint);

    let typingDone = false;
    const skipTyping = () => { if (!typingDone) skipFlag = true; };
    wrap.addEventListener('click', skipTyping);

    (async () => {
      for (const block of scene.content) {
        await sleep(skipFlag ? 0 : 220);
        let el;
        if (block.type === 'text') {
          el = document.createElement('p'); el.className = 'sc-text';
        } else if (block.type === 'speech') {
          el = document.createElement('div'); el.className = 'sc-speech';
        } else if (block.type === 'inscription') {
          el = document.createElement('div'); el.className = 'sc-inscription';
        }
        contentArea.appendChild(el);
        await typeEl(el, block.text, skipFlag ? 0 : 15);
        await sleep(skipFlag ? 0 : 280);
      }

      typingDone = true;
      hint.remove();
      wrap.removeEventListener('click', skipTyping);

      if (scene.options) renderOptions(div, scene);
      else if (scene.action) renderAction(div, scene.action);
    })();
  }

  function renderOptions(parent, scene) {
    const optsDiv = document.createElement('div');
    optsDiv.id = 'scene-opts';
    parent.appendChild(optsDiv);

    const feedback = document.createElement('div');
    feedback.id = 'scene-feedback';
    parent.appendChild(feedback);

    let answered = false;
    let locked = false;

    const optionRand = seededRandom(`${quest.seed}|${scene.title}`);
    shuffleWithSeed(scene.options, optionRand).forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'opt';
      btn.textContent = opt.text;
      optsDiv.appendChild(btn);

      btn.onclick = async () => {
        if (locked || answered || btn.classList.contains('wrong')) return;

        const isCorrect = opt.correct === true || opt.anyCorrect === true || opt.correct === undefined;
        locked = true;
        feedback.textContent = '';
        skipFlag = false;

        if (!isCorrect) {
          btn.classList.add('wrong');
          feedback.className = 'neg';
          await typeEl(feedback, opt.response || 'The quest makes a disappointed clicking sound. Try again.', 13);
          locked = false;
          return;
        }

        answered = true;
        btn.classList.add('correct');
        optsDiv.querySelectorAll('.opt:not(.correct)').forEach(b => b.classList.add('dimmed'));
        feedback.className = 'pos';

        await typeEl(feedback, opt.response, 13);

        const nb = document.createElement('button');
        nb.className = 'next-btn';
        nb.textContent = sceneIdx >= quest.parts ? '▶  REVEAL THE MEETING' : '▶  CONTINUE THE QUEST';
        parent.appendChild(nb);
        nb.onclick = () => { sceneIdx++; renderScene(sceneIdx); };
        locked = false;
      };
    });
  }

  function renderAction(parent, action) {
    const btn = document.createElement('button');
    btn.className = 'next-btn';
    btn.textContent = action.label;
    parent.appendChild(btn);
    btn.onclick = () => { sceneIdx = action.next; renderScene(sceneIdx); };
  }

  async function renderRevelation() {
    wrap.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'scene-enter';
    wrap.appendChild(div);

    const placeLabel = extractPlaceLabel(quest.maps);
    const formattedDate = formatQuestDate(quest.datetime);

    const ey = document.createElement('div');
    ey.className = 'sc-eyebrow';
    ey.textContent = 'THE QUEST REVEALS ITSELF';
    div.appendChild(ey);

    const titleEl = document.createElement('div');
    titleEl.className = 'sc-title';
    titleEl.textContent = `${quest.name.toUpperCase()}, YOU ARE SUMMONED`;
    div.appendChild(titleEl);

    const hr = document.createElement('hr'); hr.className = 'sc-hr'; div.appendChild(hr);

    const intro = document.createElement('p');
    intro.className = 'sc-text';
    div.appendChild(intro);
    await typeEl(intro, 'The trials are complete. The hidden meeting can now be known.', 15);

    const card = document.createElement('div');
    card.className = 'rev-card';
    div.appendChild(card);

    const placeLbl = document.createElement('div');
    placeLbl.className = 'rev-lbl';
    placeLbl.textContent = 'EXACT LOCATION';
    card.appendChild(placeLbl);

    const place = document.createElement('div');
    place.className = 'rev-big';
    place.textContent = placeLabel || 'Open the Google Maps quest marker';
    card.appendChild(place);

    const timeLbl = document.createElement('div');
    timeLbl.className = 'rev-lbl';
    timeLbl.textContent = 'DATE AND TIME';
    card.appendChild(timeLbl);

    const time = document.createElement('div');
    time.className = 'rev-time';
    time.textContent = formattedDate;
    card.appendChild(time);

    const mapA = document.createElement('a');
    mapA.className = 'rev-map';
    mapA.href = quest.maps;
    mapA.target = '_blank';
    mapA.rel = 'noopener noreferrer';
    mapA.textContent = '📍  OPEN EXACT LOCATION IN MAPS';
    div.appendChild(mapA);

    const footer = document.createElement('div');
    footer.className = 'rev-footer';
    footer.textContent = 'Do not be late.';
    div.appendChild(footer);
  }

  renderScene(0);
}
</script>
</body>
</html>
